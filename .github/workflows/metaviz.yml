name: Build metaviz

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: metaviz
          fetch-depth: 0

      - name: Download mrs rule sets
        run: |
          mkdir -p assets/mrs
          BASE_GEOSITE="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite"
          BASE_GEOIP="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geoip"

          curl -fsSL "${BASE_GEOSITE}/cn.mrs"              -o assets/mrs/geosite-cn.mrs
          curl -fsSL "${BASE_GEOSITE}/gfw.mrs"             -o assets/mrs/geosite-gfw.mrs
          curl -fsSL "${BASE_GEOSITE}/geolocation-!cn.mrs" -o "assets/mrs/geosite-geolocation-!cn.mrs"
          curl -fsSL "${BASE_GEOIP}/cn.mrs"                -o assets/mrs/geoip-cn.mrs
          curl -fsSL "${BASE_GEOIP}/telegram.mrs"          -o assets/mrs/geoip-telegram.mrs
          curl -fsSL "https://raw.githubusercontent.com/evecus/ruleset/refs/heads/master/mihomo/ads.mrs" \
                                                            -o assets/mrs/ads.mrs
          curl -fsSL "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs" \
                                                            -o assets/mrs/fakeipfilter.mrs

          echo "=== Rule set sizes ==="
          for f in assets/srs/*.mrs; do
            echo "  $(basename $f): $(wc -c < "$f") bytes"
          done

      # в”Ђв”Ђ Frontend в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Build frontend
        working-directory: web
        run: npm install && npm run build

      # в”Ђв”Ђ Go в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - run: go mod tidy

      - name: Build binaries (CGO_ENABLED=0, fully static)
        run: |
          mkdir -p dist
          build() {
            local goos=$1 goarch=$2 goarm=$3 name=$4
            echo "Building $name..."
            env GOOS=$goos GOARCH=$goarch GOARM=$goarm CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" -o "dist/$name" .
          }
          build linux amd64 ""  metaviz-linux-amd64
          build linux arm64 ""  metaviz-linux-arm64
  

      - name: Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test
          name: p-board test
          files: dist/metaviz-*
          generate_release_notes: false
