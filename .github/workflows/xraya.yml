name: Build xraya

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build linux/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: xraya
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o xraya-linux-${{ matrix.arch }} \
            .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test
          name: p-board test
          files: |
            xraya-linux-amd64
            xraya-linux-arm64
          generate_release_notes: false
